<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MRA 지원서 접수</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      line-height: 1.6;
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .hero {
      background: #111827;
      color: #ffffff;
      padding: 36px 32px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: 34px;
      font-weight: 800;
      line-height: 1.3;
    }
    .hero p {
      margin: 0;
      font-size: 17px;
      color: #d1d5db;
    }
    .body {
      padding: 36px 32px 40px;
    }
    .section-title {
      margin: 0 0 20px;
      font-size: 24px;
      font-weight: 800;
      color: #111827;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 20px;
    }
    .field {
      display: flex;
      flex-direction: column;
    }
    .field.full {
      grid-column: 1 / -1;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }
    .required {
      color: #dc2626;
      margin-left: 4px;
    }
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="date"],
    textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
      outline: none;
    }
    input:focus,
    textarea:focus {
      border-color: #111827;
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.08);
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .radio-group,
    .check-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 18px;
      padding-top: 6px;
    }
    .radio-item,
    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 500;
    }
    .privacy-box {
      margin-top: 10px;
      padding: 18px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      font-size: 15px;
      color: #374151;
    }
    .submit-wrap {
      margin-top: 34px;
      display: flex;
      justify-content: center;
    }
    button[type="submit"] {
      appearance: none;
      border: 0;
      background: #111827;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      padding: 16px 34px;
      border-radius: 14px;
      cursor: pointer;
      min-width: 220px;
    }
    button[type="submit"]:hover {
      opacity: 0.92;
    }
    .notice {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: #6b7280;
    }

    @media (max-width: 768px) {
      .hero h1 { font-size: 28px; }
      .body { padding: 28px 20px 32px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <h1>MRA 지원서 접수</h1>
        <p>아래 항목을 정확히 입력해 주십시오. 접수 후 마지막 화면에서 담당교수 문자 안내가 표시됩니다.</p>
      </div>

      <div class="body">
        <h2 class="section-title">지원자 정보 입력</h2>

        <form
          id="applicationForm"
          action="https://script.google.com/macros/s/AKfycbw5VQtUiv2mLZA4hk_S2NqkuPEOa4G6lP7GeI5IedqzI6Xojufmd_KGcS3fp35cd5Zrdw/exec"
          method="POST"
          target="_top"
        >
          <div class="grid">
            <div class="field">
              <label for="name">성명<span class="required">*</span></label>
              <input type="text" id="name" name="name" required />
            </div>

            <div class="field">
              <label for="phone">휴대전화<span class="required">*</span></label>
              <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" required />
            </div>

            <div class="field">
              <label for="email">이메일<span class="required">*</span></label>
              <input type="email" id="email" name="email" placeholder="example@email.com" required />
            </div>

            <div class="field">
              <label for="birth">생년월일</label>
              <input type="date" id="birth" name="birth" />
            </div>

            <div class="field full">
              <label for="company">소속</label>
              <input type="text" id="company" name="company" placeholder="소속 회사, 기관, 사무소 등" />
            </div>

            <div class="field full">
              <label>공인중개사 자격 여부</label>
              <div class="radio-group">
                <label class="radio-item">
                  <input type="radio" name="license" value="있음" />
                  있음
                </label>
                <label class="radio-item">
                  <input type="radio" name="license" value="없음" />
                  없음
                </label>
              </div>
            </div>

            <div class="field full">
              <label>4년제 대학 졸업 여부</label>
              <div class="radio-group">
                <label class="radio-item">
                  <input type="radio" name="degree" value="졸업" />
                  졸업
                </label>
                <label class="radio-item">
                  <input type="radio" name="degree" value="재학" />
                  재학
                </label>
                <label class="radio-item">
                  <input type="radio" name="degree" value="기타" />
                  기타
                </label>
              </div>
            </div>

            <div class="field full">
              <label>지원동기</label>
              <div class="radio-group">
                <label class="radio-item">
                  <input type="radio" name="motivation" value="전문성 강화" />
                  전문성 강화
                </label>
                <label class="radio-item">
                  <input type="radio" name="motivation" value="실무 역량 향상" />
                  실무 역량 향상
                </label>
                <label class="radio-item">
                  <input type="radio" name="motivation" value="학위 취득" />
                  학위 취득
                </label>
                <label class="radio-item">
                  <input type="radio" name="motivation" value="네트워크 확대" />
                  네트워크 확대
                </label>
                <label class="radio-item">
                  <input type="radio" name="motivation" value="기타" />
                  기타
                </label>
              </div>
            </div>

            <div class="field full">
              <label for="motivationOther">기타 사유</label>
              <textarea id="motivationOther" name="motivationOther" placeholder="기타 지원 사유를 입력해 주십시오."></textarea>
            </div>

            <div class="field full">
              <label>개인정보 수집 및 이용 동의<span class="required">*</span></label>
              <div class="privacy-box">
                입력하신 정보는 MRA 지원서 접수, 지원자 확인, 안내 연락을 위한 목적으로만 사용됩니다.
              </div>
              <div class="check-group">
                <label class="check-item">
                  <input type="checkbox" name="privacy" value="동의" required />
                  개인정보 수집 및 이용에 동의합니다.
                </label>
              </div>
            </div>
          </div>

          <div class="submit-wrap">
            <button type="submit">지원서 제출</button>
          </div>

          <div class="notice">
            제출 후 마지막 화면에서 담당교수 문자 안내가 표시됩니다.
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
